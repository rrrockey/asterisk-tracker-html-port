<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Asterisk JS</title>
  <style>
    body {
      background: #000;
      color: #fff;
      font-family: 'Courier New', Courier, monospace;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      height: 100vh;
    }
    #ui {
      margin-top: 16px;
      width: 400px;
      display: flex;
      justify-content: space-between;
      font-size: 16px;
    }
    #record { text-align: right; flex: 1; }
    #level  { text-align: left;  flex: 1; }
    #instructions {
      margin-top: 8px;
      color: #ff0;
      font-size: 14px;
      width: 400px;
      text-align: center;
    }
    #difficulty {
      margin-top: 4px;
      font-size: 12px;
      width: 400px;
      text-align: center;
      min-height: 16px;
    }
    #canvasWrapper {
      position: relative;
      width: 400px;
      height: 220px;
      margin-top: 12px;
      border: 2px solid #fff;
      box-sizing: content-box;
    }
    #trailCanvas, #gameCanvas {
      position: absolute;
      top: 0; left: 0;
      display: block;
    }
    #countdownOverlay {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 72px;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 0 16px rgba(255,255,255,0.35);
      background: rgba(0,0,0,0.20);
      user-select: none;
      pointer-events: none;
    }
    #startRow {
      margin-top: 14px;
      width: 400px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    #startBtn {
      padding: 8px 24px;
      font-size: 16px;
      background: #eee;
      color: #222;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    #startBtn:disabled {
      background: #555;
      color: #888;
      cursor: not-allowed;
    }
    #startDifficulty {
      padding: 8px 10px;
      font-size: 14px;
      border-radius: 4px;
      border: 1px solid #666;
      background: #111;
      color: #fff;
      outline: none;
    }
    #startDifficulty:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    #startDifficultyLabel {
      font-size: 12px;
      color: #bbb;
      user-select: none;
    }
    #countdownToggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #bbb;
      user-select: none;
    }
    #countdownToggle input {
      transform: translateY(1px);
    }
  </style>
</head>
<body>
  <div id="ui">
    <div id="level">Level 1</div>
    <div id="record">Record: Level 1 by nobody</div>
  </div>
  <div id="instructions">Hold Space / Enter to rise, release to fall</div>
  <div id="difficulty"></div>
  <div id="canvasWrapper">
    <canvas id="trailCanvas" width="400" height="220"></canvas>
    <canvas id="gameCanvas"  width="400" height="220"></canvas>
    <div id="countdownOverlay">3</div>
  </div>

  <div id="startRow">
    <span id="startDifficultyLabel">Start:</span>
    <select id="startDifficulty" aria-label="Starting difficulty">
      <option value="easy" selected>Easy</option>
      <option value="medium">Medium</option>
      <option value="hard">Hard</option>
    </select>

    <label id="countdownToggle" title="Show a 3-2-1 countdown before starting">
      <input id="countdownEnabled" type="checkbox" checked>
      3-second countdown
    </label>

    <button id="startBtn">Start Game</button>
  </div>

  <script>
    const trailCanvas = document.getElementById('trailCanvas');
    const tc = trailCanvas.getContext('2d');
    const gameCanvas  = document.getElementById('gameCanvas');
    const gc = gameCanvas.getContext('2d');

    const levelLabel   = document.getElementById('level');
    const recordLabel  = document.getElementById('record');
    const startBtn     = document.getElementById('startBtn');
    const instructions = document.getElementById('instructions');
    const difficultyEl = document.getElementById('difficulty');
    const startDifficulty = document.getElementById('startDifficulty');

    const countdownEnabledEl = document.getElementById('countdownEnabled');
    const countdownOverlay = document.getElementById('countdownOverlay');

    const W = 400, H = 220;
    const PLAYER_R = 3;

    const BASE_SPEED   = 1.3;
    const BASE_VERT    = 1.8; // constant vertical speed (up or down)

    // Obstacles are now a 2x2 cluster of asterisks.
    // We treat each obstacle as a small square for collision, and render 4 "*" glyphs.
    const OB_GLYPH_SPACING = 8;   // px between glyph centers in the 2x2 cluster
    const OB_HALF_EXTENT   = 6;   // half-size (px) of the collision square around obstacle center

    const TIERS = [
      { min: 1,  max: 3,  label: 'Easy',      color: '#4f4' },
      { min: 4,  max: 7,  label: 'Medium',    color: '#ff0' },
      { min: 8,  max: 12, label: 'Hard',      color: '#f90' },
      { min: 13, max: 18, label: 'Very Hard', color: '#f44' },
      { min: 19, max: 99, label: 'INSANE',    color: '#f0f' },
    ];

    const START_LEVELS = {
      easy: 1,
      medium: 4,
      hard: 8,
    };

    let running = false;
    let level = 1, recordLevel = 1, recordName = 'nobody';
    let playerX = 0, playerY = H / 2, playerVY = 0;
    let prevX = 0, prevY = H / 2;
    let obstacles = [];
    let keyDown = false;
    let animId = null;

    // Countdown state
    let countdownTimer = null;
    let starting = false;

    // --- Scaling ---
    const speed   = lvl => BASE_SPEED + (lvl - 1) * 0.12;
    const vert    = lvl => BASE_VERT  + (lvl - 1) * 0.08; // vertical speed scales with level
    const nObs    = lvl => 6 + (lvl - 1) * 3;
    const tier    = lvl => TIERS.find(t => lvl >= t.min && lvl <= t.max) || TIERS.at(-1);

    // --- Record ---
    function loadRecord() {
      recordLevel = parseInt(localStorage.getItem('ast2_rl') || '1', 10);
      recordName  = localStorage.getItem('ast2_rn') || 'nobody';
      recordLabel.textContent = `Record: Level ${recordLevel} by ${recordName}`;
    }
    function saveRecord() {
      localStorage.setItem('ast2_rl', recordLevel);
      localStorage.setItem('ast2_rn', recordName);
      recordLabel.textContent = `Record: Level ${recordLevel} by ${recordName}`;
    }
    function updateLevelLabel() {
      levelLabel.textContent   = `Level ${level}`;
      const t = tier(level);
      difficultyEl.style.color = t.color;
      difficultyEl.textContent = running ? t.label : '';
    }

    function getSelectedStartLevel() {
      const key = (startDifficulty?.value || 'easy').toLowerCase();
      return START_LEVELS[key] ?? 1;
    }

    function isCountdownEnabled() {
      return !!countdownEnabledEl?.checked;
    }

    function showCountdown(val) {
      countdownOverlay.textContent = String(val);
      countdownOverlay.style.display = 'flex';
    }

    function hideCountdown() {
      countdownOverlay.style.display = 'none';
    }

    function cancelCountdown() {
      if (countdownTimer) {
        clearInterval(countdownTimer);
        countdownTimer = null;
      }
      starting = false;
      hideCountdown();
    }

    // --- Obstacles ---
    // Place obstacle centers randomly, avoiding a safe corridor at the very start.
    function placeObstacles(lvl) {
      obstacles = [];
      const count   = nObs(lvl);
      const safeEnd = 44; // px from left edge that's kept clear
      const placed  = [];

      // Keep centers away from edges so the 2x2 cluster stays on-canvas.
      const padX = Math.max(OB_HALF_EXTENT, OB_GLYPH_SPACING / 2) + 2;
      const padY = Math.max(OB_HALF_EXTENT, OB_GLYPH_SPACING / 2) + 2;

      for (let attempt = 0; attempt < count * 10 && placed.length < count; attempt++) {
        const x = Math.random() * (W - safeEnd - padX * 2) + safeEnd + padX;
        const y = Math.random() * (H - padY * 2) + padY;
        if (!placed.some(p => Math.hypot(p.x - x, p.y - y) < 20))
          placed.push({ x, y });
      }
      obstacles = placed;
    }

    // --- Trail (persistent canvas) ---
    function trailColor(lvl) { return tier(lvl).color; }

    function paintSegment(x1, y1, x2, y2, lvl) {
      tc.save();
      tc.strokeStyle = trailColor(lvl);
      tc.lineWidth   = PLAYER_R * 1.6;
      tc.lineCap     = 'round';
      tc.globalAlpha = 0.9;
      tc.shadowColor = trailColor(lvl);
      tc.shadowBlur  = 6;
      tc.beginPath();
      tc.moveTo(x1, y1);
      tc.lineTo(x2, y2);
      tc.stroke();
      tc.restore();
    }

    function dimTrail() {
      // Overlay semi-transparent black so past levels' trails linger but fade
      tc.fillStyle = 'rgba(0,0,0,0.40)';
      tc.fillRect(0, 0, W, H);
    }

    function clearTrail() {
      tc.clearRect(0, 0, W, H);
    }

    // --- Game canvas (cleared every frame) ---
    function drawFrame() {
      gc.clearRect(0, 0, W, H);

      // Progress bar
      const pct = Math.min(playerX / W, 1);
      gc.fillStyle = 'rgba(255,255,255,0.10)';
      gc.fillRect(0, 0, W, 3);
      gc.fillStyle = trailColor(level);
      gc.fillRect(0, 0, W * pct, 3);

      // Asterisks (2x2)
      gc.fillStyle    = '#fff';
      gc.font         = '10px Courier New';
      gc.textAlign    = 'center';
      gc.textBaseline = 'middle';
      gc.shadowColor  = '#888';
      gc.shadowBlur   = 4;

      const d = OB_GLYPH_SPACING / 2;
      for (const o of obstacles) {
        gc.fillText('*', o.x - d, o.y - d);
        gc.fillText('*', o.x + d, o.y - d);
        gc.fillText('*', o.x - d, o.y + d);
        gc.fillText('*', o.x + d, o.y + d);
      }
      gc.shadowBlur = 0;

      // Player
      gc.beginPath();
      gc.arc(playerX, playerY, PLAYER_R, 0, Math.PI * 2);
      gc.fillStyle   = '#ff0';
      gc.shadowColor = '#ff0';
      gc.shadowBlur  = 12;
      gc.fill();
      gc.shadowBlur  = 0;
    }

    // --- Collision ---
    function collides() {
      if (playerY - PLAYER_R < 0 || playerY + PLAYER_R > H) return true;

      // Circle (player) vs AABB (obstacle cluster square)
      for (const o of obstacles) {
        const dx = Math.max(Math.abs(playerX - o.x) - OB_HALF_EXTENT, 0);
        const dy = Math.max(Math.abs(playerY - o.y) - OB_HALF_EXTENT, 0);
        if (dx * dx + dy * dy < PLAYER_R * PLAYER_R) return true;
      }
      return false;
    }

    // --- Level up ---
    function nextLevel() {
      level++;
      updateLevelLabel();
      dimTrail();
      prevX = 0; prevY = playerY;
      playerX = 0; playerVY = 0;
      placeObstacles(level);
      const t = tier(level);
      instructions.textContent = `Level ${level} — ${t.label}!`;
      setTimeout(() => {
        if (running) instructions.textContent = 'Hold Space / Enter to rise, release to fall';
      }, 900);
    }

    // --- Game over ---
    function gameOver() {
      running = false;
      cancelCountdown();
      startBtn.disabled = false;
      startDifficulty.disabled = false;
      countdownEnabledEl.disabled = false;
      difficultyEl.textContent = '';
      instructions.textContent = 'Game Over! Press Start to play again.';
      if (level > recordLevel) {
        setTimeout(() => {
          const name = prompt(`New record! You reached Level ${level}!\nEnter your name:`, recordName);
          if (name && name.trim()) recordName = name.trim();
          recordLevel = level;
          saveRecord();
        }, 120);
      }
    }

    // --- Loop ---
    function tick() {
      if (!running) return;

      prevX = playerX;
      prevY = playerY;

      // Advance player
      playerX += speed(level);

      // Vertical: instant snap — no acceleration
      playerVY = keyDown ? -vert(level) : vert(level);
      playerY += playerVY;

      // Paint trail segment
      paintSegment(prevX, prevY, playerX, playerY, level);

      // Collision
      if (collides()) {
        drawFrame();
        gameOver();
        return;
      }

      // Level complete
      if (playerX >= W) {
        nextLevel();
      }

      drawFrame();
      animId = requestAnimationFrame(tick);
    }

    function beginRun() {
      running = true;
      starting = false;
      hideCountdown();

      const t = tier(level);
      instructions.textContent = `Starting on Level ${level} — ${t.label}. Hold Space / Enter to rise, release to fall`;
      drawFrame();
      animId = requestAnimationFrame(tick);
    }

    // --- Start ---
    function startGame() {
      if (animId) cancelAnimationFrame(animId);
      cancelCountdown();

      // Setup state immediately (so you can see the level/obstacles during countdown)
      level    = getSelectedStartLevel();
      playerX  = 0; playerY  = H / 2;
      prevX    = 0; prevY    = H / 2;
      playerVY = 0;

      clearTrail();
      placeObstacles(level);
      updateLevelLabel();
      drawFrame();

      startBtn.disabled = true;
      startDifficulty.disabled = true;
      countdownEnabledEl.disabled = true;

      if (!isCountdownEnabled()) {
        beginRun();
        return;
      }

      // Countdown: 3..2..1..GO (start on GO transition)
      starting = true;
      let n = 3;
      showCountdown(n);
      instructions.textContent = 'Get ready...';

      countdownTimer = setInterval(() => {
        n--;
        if (n > 0) {
          showCountdown(n);
          return;
        }

        // brief "GO" flash then start
        showCountdown('GO');
        clearInterval(countdownTimer);
        countdownTimer = null;
        setTimeout(() => {
          if (!starting) return; // cancelled
          beginRun();
        }, 300);
      }, 1000);
    }

    // --- Input ---
    document.addEventListener('keydown', e => {
      if (e.code === 'Space' || e.code === 'Enter') { keyDown = true;  e.preventDefault(); }
    });
    document.addEventListener('keyup', e => {
      if (e.code === 'Space' || e.code === 'Enter') { keyDown = false; e.preventDefault(); }
    });
    gameCanvas.addEventListener('touchstart', e => { keyDown = true;  e.preventDefault(); }, { passive: false });
    gameCanvas.addEventListener('touchend',   e => { keyDown = false; e.preventDefault(); }, { passive: false });
    startBtn.addEventListener('click', startGame);

    loadRecord();
    drawFrame();
  </script>
</body>
</html>
